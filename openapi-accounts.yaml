openapi: 3.0.3
info:
  title: Mock Banking Service - Accounts API
  description: API for managing bank accounts in the mock banking service
  version: 1.0.0
  contact:
    name: API Support
    email: anjana.ananth@ibm.com

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://mockbankingservice.onrender.com/api
    description: Production server

tags:
  - name: Accounts
    description: Operations related to bank accounts

paths:
  /accounts:
    get:
      tags:
        - Accounts
      summary: Get all accounts
      description: Retrieve a list of all bank accounts in the system
      operationId: getAllAccounts
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
              example:
                success: true
                count: 2
                data:
                  - id: ACC001
                    customerId: CUST001
                    accountNumber: "1234567890"
                    accountType: SAVINGS
                    balance: 15000.50
                    currency: USD
                    status: ACTIVE
                    openDate: "2023-01-15"
                  - id: ACC002
                    customerId: CUST001
                    accountNumber: "1234567891"
                    accountType: CHECKING
                    balance: 5000.00
                    currency: USD
                    status: ACTIVE
                    openDate: "2023-02-20"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: Internal server error
                message: An unexpected error occurred

  /accounts/{id}:
    get:
      tags:
        - Accounts
      summary: Get account by ID
      description: Retrieve a specific bank account by its ID
      operationId: getAccountById
      parameters:
        - name: id
          in: path
          description: Account ID
          required: true
          schema:
            type: string
            example: ACC001
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
              example:
                success: true
                data:
                  id: ACC001
                  customerId: CUST001
                  accountNumber: "1234567890"
                  accountType: SAVINGS
                  balance: 15000.50
                  currency: USD
                  status: ACTIVE
                  openDate: "2023-01-15"
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Account not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: Internal server error
                message: An unexpected error occurred

components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
          description: Unique account identifier
          example: ACC001
        customerId:
          type: string
          description: ID of the customer who owns this account
          example: CUST001
        accountNumber:
          type: string
          description: Bank account number
          example: "1234567890"
        accountType:
          type: string
          description: Type of account
          enum:
            - SAVINGS
            - CHECKING
            - FIXED_DEPOSIT
          example: SAVINGS
        balance:
          type: number
          format: double
          description: Current account balance
          example: 15000.50
        currency:
          type: string
          description: Currency code
          example: USD
        status:
          type: string
          description: Account status
          enum:
            - ACTIVE
            - INACTIVE
            - CLOSED
          example: ACTIVE
        openDate:
          type: string
          format: date
          description: Date when the account was opened
          example: "2023-01-15"
      required:
        - id
        - customerId
        - accountNumber
        - accountType
        - balance
        - currency
        - status
        - openDate

    AccountListResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful
        count:
          type: integer
          description: Number of accounts returned
        data:
          type: array
          items:
            $ref: '#/components/schemas/Account'
      required:
        - success
        - count
        - data

    AccountResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful
        data:
          $ref: '#/components/schemas/Account'
      required:
        - success
        - data

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful
        error:
          type: string
          description: Error message
      required:
        - success
        - error

    Error:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Detailed error message
      required:
        - success
        - error

